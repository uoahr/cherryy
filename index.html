<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 이게 모게요 🌸</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let petals = [];
        let grounded = [];
        const shapes = ["🌸", "✿", "❀", "💮"];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // ⭐ 모바일/웹 크기 밸런스 패치 (작고 소중하게)
            const isMobile = canvas.width < 600;
            const sizeBase = isMobile ? 12 : 14; 
            const count = isMobile ? 70 : 100;

            petals = [];
            for (let i = 0; i < count; i++) {
                petals.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * sizeBase + sizeBase,
                    speed: Math.random() * 4 + 3, // 시원시원한 속도
                    angle: Math.random() * 360,
                    spin: Math.random() * 4 - 2,
                    shape: shapes[Math.floor(Math.random() * shapes.length)],
                    wind: Math.random() * 2 - 1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 바닥에 쌓인 꽃잎 (은은하게)
            grounded.forEach(p => {
                ctx.save();
                ctx.font = `${p.size}px serif`;
                ctx.globalAlpha = 0.5;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle * Math.PI / 180);
                ctx.fillText(p.shape, 0, 0);
                ctx.restore();
            });

            // 2. 떨어지는 꽃잎
            petals.forEach(p => {
                ctx.save();
                ctx.font = `${p.size}px serif`;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle * Math.PI / 180);
                ctx.fillText(p.shape, 0, 0);
                ctx.restore();

                p.y += p.speed;
                p.x += Math.sin(p.y / 40) + p.wind;
                p.angle += p.spin;

                // 바닥 도착 로직
                if (p.y > canvas.height - 10) {
                    grounded.push({
                        x: p.x,
                        y: canvas.height - (Math.random() * 8 + 2),
                        size: p.size * 0.8,
                        shape: p.shape,
                        angle: p.angle
                    });
                    if (grounded.length > 70) grounded.shift();

                    p.y = -50;
                    p.x = Math.random() * canvas.width;
                }
            });

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
